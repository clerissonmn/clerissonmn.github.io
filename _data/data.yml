career-profile:
    title: RESUMO
    summary: |
      Graduação em Física Bacharelado (2010), Mestrado em Física (2012) e Doutorado (2016) em Engenharia Elétrica pela Universidade Federal do Pará. Bolsista de Pós-doutorado Júnior do CNPq (2016-2017), professor substituto da Faculdade de Engenharia Elétrica e Biomédica (2016-2018), pesquisador do laboratório de Nanofotônica e Nanoeletrônica da UFPA (2010-2017). Experiência na área de pesquisa e desenvolvimento em física e engenharia e na área de ciências de dados. Experiência em coordenação de equipe, orientação acadêmica, conhecimento em tecnologia de gestão de informações (B.I).

