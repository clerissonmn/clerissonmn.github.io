experiences:
    - role: Professor Universitário
      time: 2019 - Atual
      company: Estacio Castanhal
      details: |
        Professor do curso de Engenharia Civil. Principais disciplinas ministradas:
          - Análise de Dados
          - Física teórica e experimental I e III
          - Análise Matemática para Engenharia II e III
          - Cálculo Diferencial e Integral III
          - Físico-Quimica

    - role: Professor Universitário
      time: 2016 - 2018
      company: Universidade Federal do Pará
      details: |
        Professor da faculdade de Engenharia Elétrica e Biomédica. Principais disciplinas ministradas
          - Física I
          - Cálculo IV
          - Materiais Elétricos
          - Eletrônica Digital
          - Funções Especiais para a Engenharia

    - role: Pesquisador Assistente de Coordenação
      time: 2010 - 2017
      company: Laboratório de Nanoeletrônica e nanofotônica da UFPA
      details: |
        O laboratório em questão atua na pesquia em nanotecnologia aplicada na forma de desenvolvimento de dispositivos de comunicação baseados em grafeno. Durante este o período ocupou lugar de destaque na assistência da gestão do grupo de pesquisa. Dentre as atividades exercidas destacam-se:
          - Obtenção, tratamento, interpretação e aplicação dos dados ao desenvolvimento dos dispositivos;
          - Auxílio na coordenação e orientação de mais de 10 pesquisadores, compreendendo graduação, mestrado e doutorado (maioria);
          - Também atuou como representante no gerenciamento dos projetos, monitorando os respectivos progressos e na prestação de contas;

